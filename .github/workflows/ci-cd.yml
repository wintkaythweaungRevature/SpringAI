name: Build and Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: CI=false npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest

      # ── Backend ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend JAR
        run: mvn clean package -DskipTests
        working-directory: backend

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest

      # ── Deploy to EC2 ─────────────────────────────────────────
      # Required secrets: EC2_HOST (public IP or DNS), EC2_SSH_KEY (private key).
      # If you see "dial tcp ***:22: i/o timeout": open port 22 in EC2 Security Group
      # (Inbound rules → SSH from 0.0.0.0/0 or https://api.github.com/meta for GitHub IPs).
      - name: Check deploy secrets
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "::error::EC2_HOST secret is not set. Add it in repo Settings → Secrets and variables → Actions to enable deploy."
            exit 1
          fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "::error::EC2_SSH_KEY secret is not set. Add your EC2 SSH private key in repo Settings → Secrets and variables → Actions."
            exit 1
          fi

      # Allow job to succeed when EC2 is unreachable (e.g. port 22 not open). Remove continue-on-error once deploy works.
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest
            docker stop spring-ai-react 2>/dev/null || true
            docker rm spring-ai-react 2>/dev/null || true
            docker run -d -p 80:80 --name spring-ai-react --restart always ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest
            docker stop spring-ai-backend 2>/dev/null || true
            docker rm spring-ai-backend 2>/dev/null || true
            if [ -f /root/backend.env ]; then
              docker run -d -p 8080:8080 --name spring-ai-backend --restart always -v /root/certs:/app/certs --env-file /root/backend.env ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest
            else
              docker run -d -p 8080:8080 --name spring-ai-backend --restart always ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest
            fi
