name: Build and Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: CI=false npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest

      # ── Backend ───────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend JAR
        run: mvn clean package -DskipTests
        working-directory: backend

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest

      # ── Deploy to EC2 ─────────────────────────────────────────
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest

            docker stop spring-ai-react 2>/dev/null; docker rm spring-ai-react 2>/dev/null
            docker run -d -p 80:80 --name spring-ai-react --restart always \
              ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest

            docker stop spring-ai-backend 2>/dev/null; docker rm spring-ai-backend 2>/dev/null
            docker run -d -p 8080:8080 --name spring-ai-backend --restart always \
              -v /root/certs:/app/certs \
              --env-file /root/backend.env \
              ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest
