name: Build and Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── Frontend ──────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build React App
        run: CI=false npx react-scripts build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest

      # ── Deploy to EC2 (optional) ──────────────────────────────
      # Backend image is built and pushed by the WintSpringAIBackEnd repo's workflow.
      # If EC2_HOST / EC2_SSH_KEY are unset, we still succeed — image is on Docker Hub; deploy manually.
      # If you see "dial tcp ***:22: i/o timeout": open port 22 in EC2 Security Group.
      - name: Decide whether to deploy
        id: deploy_gate
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -n "$EC2_HOST" ] && [ -n "$EC2_SSH_KEY" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
            echo "Deploy step will run (EC2 secrets are set)."
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping EC2 deploy — set EC2_HOST and EC2_SSH_KEY in repo Settings → Secrets and variables → Actions to auto-deploy. Docker image was still pushed."
          fi

      # If deploy fails (SSH timeout, etc.), check repo Settings → Secrets. Run scripts/redeploy-backend.sh on EC2 manually.
      - name: Deploy to EC2
        if: steps.deploy_gate.outputs.ok == 'true'
        uses: appleboy/ssh-action@v1
        continue-on-error: true
        with:
          host: ${{ secrets.EC2_HOST }}
          username: root
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest
            docker stop spring-ai-react 2>/dev/null || true
            docker rm spring-ai-react 2>/dev/null || true
            docker run -d -p 80:80 --name spring-ai-react --restart always ${{ secrets.DOCKER_USERNAME }}/spring-ai-react:latest
            docker stop spring-ai-backend 2>/dev/null || true
            docker rm spring-ai-backend 2>/dev/null || true
            ENV_FILE=""
            if [ -f /root/.env ]; then ENV_FILE="--env-file /root/.env"; fi
            docker run -d -p 8080:8080 --name spring-ai-backend --restart always $ENV_FILE ${{ secrets.DOCKER_USERNAME }}/spring-ai-backend:latest
