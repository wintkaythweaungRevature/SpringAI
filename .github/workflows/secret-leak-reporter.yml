# SecretLeakReportor — runs on PR and default-branch pushes.
# Produces an artifact for human / CoverKey agent review. Does not block the merge by default.
name: SecretLeakReportor

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run SecretLeakReportor
        run: node scripts/security/scan-secrets.mjs --json --no-fail
        continue-on-error: true

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: secret-leak-report
          path: |
            reports/security/secret-leak-latest.json
          if-no-files-found: ignore

      - name: Summary (PR hint)
        run: |
          echo "## SecretLeakReportor" >> "$GITHUB_STEP_SUMMARY"
          echo "Download **secret-leak-report** artifact. Hand off to **CoverKey** to remediate, then re-run scan locally: \`npm run security:scan\`" >> "$GITHUB_STEP_SUMMARY"
          if [ -f reports/security/secret-leak-latest.json ]; then
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            head -c 8000 reports/security/secret-leak-latest.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi
