# Server
server.port=8080

# JWT (86400000=24h, 604800000=7d). Longer expiration reduces "session expired" on publish.
jwt.secret=your-32-char-secret-key-for-jwt-signing-change-in-prod
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# Database - AWS RDS PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://database-1.cnom6ku8g3n1.us-east-2.rds.amazonaws.com:5432/postgres?sslmode=require}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:100%Wint}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Email (configure via env vars: MAIL_HOST, MAIL_USERNAME, MAIL_PASSWORD)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from=${MAIL_FROM:noreply@wintaibot.com}
app.frontend-url=${APP_FRONTEND_URL:https://wintaibot.com}


# Backend base URL for OAuth callbacks (must be absolute, e.g. https://api.wintaibot.com)
app.api-base-url=${APP_API_BASE_URL:https://api.wintaibot.com}

# OpenAI (for prepare-interview / Resume Worlock, ask-ai, etc.)
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o}

# Stripe
stripe.secret-key=sk_test_your_stripe_secret_key
# Legacy default: Starter monthly (used if stripe.price.starter.monthly is empty)
stripe.price-id=price_your_monthly_price_id
# Per-plan Stripe Price IDs (set in Dashboard → Products). Required for Pro/Growth and yearly tiers.
stripe.price.starter.monthly=${STRIPE_PRICE_STARTER_MONTHLY:}
stripe.price.starter.yearly=${STRIPE_PRICE_STARTER_YEARLY:}
stripe.price.pro.monthly=${STRIPE_PRICE_PRO_MONTHLY:}
stripe.price.pro.yearly=${STRIPE_PRICE_PRO_YEARLY:}
stripe.price.growth.monthly=${STRIPE_PRICE_GROWTH_MONTHLY:}
stripe.price.growth.yearly=${STRIPE_PRICE_GROWTH_YEARLY:}
# Optional: map price IDs to plan tier for /api/subscription/current (e.g. price_abc:STARTER,price_def:PRO)
stripe.subscription-plan-by-price=
stripe.webhook-secret=whsec_your_webhook_signing_secret

# Multipart upload limits (for PDF resume uploads; video uploads need larger)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=510MB

# LinkedIn OAuth (from LinkedIn Developer Portal > Auth tab)
linkedin.client-id=${LINKEDIN_CLIENT_ID:}
linkedin.client-secret=${LINKEDIN_CLIENT_SECRET:}
linkedin.scope=${LINKEDIN_SCOPE:openid profile email w_member_social}

# Facebook & Instagram Graph API (see docs/FACEBOOK_API_SETUP.md)
facebook.app-id=${FACEBOOK_APP_ID:}
facebook.app-secret=${FACEBOOK_APP_SECRET:}
facebook.access-token=${FACEBOOK_ACCESS_TOKEN:}
facebook.verify-token=${FACEBOOK_VERIFY_TOKEN:}
social.instagram.business-account-id=${INSTAGRAM_BUSINESS_ACCOUNT_ID:}
social.instagram.app.secret=${INSTAGRAM_APP_SECRET:}
social.instagram.app-id=${INSTAGRAM_APP_ID:}