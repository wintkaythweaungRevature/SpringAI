# Server
server.port=8080

# JWT
jwt.secret=your-32-char-secret-key-for-jwt-signing-change-in-prod
jwt.expiration-ms=86400000

# Database - AWS RDS PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://database-1.cnom6ku8g3n1.us-east-2.rds.amazonaws.com:5432/postgres?sslmode=require}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:100%Wint}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Email (configure for production - e.g. SendGrid, AWS SES)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URLs (for verification emails and Stripe redirects)
app.base-url=http://localhost:3000
app.success-url=http://localhost:3000
app.cancel-url=http://localhost:3000

# OpenAI (for prepare-interview / Resume Worlock, ask-ai, etc.)
# AiService uses openai.api-key - accept either env var for Docker compatibility
openai.api-key=${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
openai.model=${OPENAI_MODEL:gpt-4o}
# Spring AI auto-config (optional, if using Spring AI starter)
spring.ai.openai.api-key=${OPENAI_API_KEY:${SPRING_AI_OPENAI_API_KEY:}}
spring.ai.openai.api-url=${SPRING_AI_OPENAI_API_URL:https://api.openai.com}

# Stripe
stripe.secret-key=sk_test_your_stripe_secret_key
stripe.price-id=price_your_monthly_price_id
stripe.webhook-secret=whsec_your_webhook_signing_secret
