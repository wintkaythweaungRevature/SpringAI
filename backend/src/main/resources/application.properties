# Server
server.port=8080

# JWT
jwt.secret=your-32-char-secret-key-for-jwt-signing-change-in-prod
jwt.expiration-ms=86400000

# Database - AWS RDS PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://database-1.cnom6ku8g3n1.us-east-2.rds.amazonaws.com:5432/postgres?sslmode=require}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:100%Wint}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Email - AWS SES SMTP
spring.mail.host=${MAIL_HOST:email-smtp.us-east-2.amazonaws.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
mail.from=${MAIL_FROM:noreply@wintaibot.com}

# App URLs
app.base-url=${APP_BASE_URL:https://api.wintaibot.com}
app.frontend-url=${APP_FRONTEND_URL:https://wintaibot.com}
app.success-url=${APP_FRONTEND_URL:https://wintaibot.com}
app.cancel-url=${APP_FRONTEND_URL:https://wintaibot.com}

# OpenAI (for prepare-interview / Resume Worlock, ask-ai, etc.)
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4o}

# Stripe
stripe.secret-key=sk_test_your_stripe_secret_key
stripe.price-id=price_your_monthly_price_id
stripe.webhook-secret=whsec_your_webhook_signing_secret

# Multipart upload limits (for PDF resume uploads)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
