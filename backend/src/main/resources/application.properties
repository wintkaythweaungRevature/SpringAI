# Server
server.port=8080

# JWT
jwt.secret=your-32-char-secret-key-for-jwt-signing-change-in-prod
jwt.expiration-ms=86400000

# H2 Database (use PostgreSQL/MySQL in production)
spring.datasource.url=jdbc:h2:mem:wintaibot
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

# Email (configure for production - e.g. SendGrid, AWS SES)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URLs (for verification emails and Stripe redirects)
app.base-url=http://localhost:3000
app.success-url=http://localhost:3000
app.cancel-url=http://localhost:3000

# Stripe
stripe.secret-key=sk_test_your_stripe_secret_key
stripe.price-id=price_your_monthly_price_id
stripe.webhook-secret=whsec_your_webhook_signing_secret
