<script type="text/babel">
const { Stage, Sprite, useSprite, useTime, Easing, interpolate, animate, clamp } = window;

// ───────── Palette ─────────
const ACC = 'oklch(76% 0.15 55)';       // amber
const COB = 'oklch(68% 0.17 250)';      // cobalt
const INK = '#f6f4ef';
const BG  = '#07090d';

// ───────── Shared chrome (captions + progress + safe zones) ─────────
function Chrome(){
  const t = useTime();
  // "Shot" chapter ticks along the bottom
  const marks = [0, 2.5, 5, 8, 11.5, 14, 15];
  return (
    <>
      {/* vignette */}
      <div style={{position:'absolute',inset:0,background:'radial-gradient(120% 80% at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%)',pointerEvents:'none',zIndex:50}}/>
      {/* top status bar (creator-POV) */}
      <div style={{position:'absolute',top:28,left:0,right:0,display:'flex',justifyContent:'space-between',padding:'0 40px',fontFamily:'JetBrains Mono, monospace',fontSize:22,color:'#fff',opacity:.55,zIndex:45,letterSpacing:'.08em'}}>
        <span>9:41</span>
        <span>●REC · 01:12</span>
      </div>
      {/* bottom chapter ticks */}
      <div style={{position:'absolute',bottom:24,left:40,right:40,display:'flex',gap:4,zIndex:45}}>
        {marks.slice(0,-1).map((m,i)=>{
          const w = (marks[i+1]-m)/15;
          const active = t >= m;
          const local = clamp((t-m)/(marks[i+1]-m),0,1);
          return <div key={i} style={{flex:w,height:3,background:'rgba(255,255,255,.15)',borderRadius:2,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${local*100}%`,background:active?ACC:'transparent',transition:'width .1s'}}/>
          </div>
        })}
      </div>
    </>
  );
}

// ───────── Shot 1 — Creator POV, tired Sunday night (0–2.5s) ─────────

  const glow = 0.6 + 0.4*Math.sin(localTime*3);
  return (
    <div style={{position:'absolute',inset:0,transform:`translate(${sx}px,${sy}px)`}}>

      <div style={{position:'absolute',inset:0,background:'radial-gradient(60% 40% at 50% 78%, rgba(30,40,80,.6), transparent 70%), linear-gradient(180deg,#0a0c14, #05060a)'}}/>

      <svg viewBox="0 0 1080 1920" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>

        <path d="M 160 1920 L 160 1500 Q 540 1280 920 1500 L 920 1920 Z" fill="#14171f"/>
        {/* neck */}

        {/* head */}

// ───────── Shot 2 — 8 platforms rain down (2.5–5s) ─────────
function Shot2(){
  const { localTime, progress } = useSprite();
  const platforms = [
    {k:'YT', c:'#ff3b3b', x:.15, delay:.0},
    {k:'TT', c:'#25f4ee', x:.38, delay:.1},
    {k:'IG', c:'#ff3d7f', x:.60, delay:.05},
    {k:'FB', c:'#4f7cff', x:.82, delay:.15},
    {k:'LI', c:'#4a90e2', x:.25, delay:.25},
    {k:'X',  c:'#ffffff', x:.50, delay:.3},
    {k:'TH', c:'#cfcfcf', x:.72, delay:.22},
    {k:'PT', c:'#e60023', x:.90, delay:.35},
  ];
  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#0a0f1c,#030509)'}}>
      {/* falling icons */}
      {platforms.map((p,i)=>{
        const start = p.delay;
        const t = clamp((localTime-start)/1.8,0,1);
        const y = Easing.easeInQuad(t) * 1950 - 200;
        const rot = t*180 - 90;
        const op = t>.92 ? 1-(t-.92)/.08 : 1;
        return (
          <div key={i} style={{
            position:'absolute', left:`${p.x*100}%`, top:y, transform:`translate(-50%,0) rotate(${rot}deg)`,
            width:160, height:160, borderRadius:32,
            background:'#0b0f1c', border:`2px solid ${p.c}`,
            display:'grid', placeItems:'center',
            boxShadow:`0 0 60px ${p.c}88`,
            opacity:op
          }}>
            <span style={{fontFamily:'Instrument Serif,serif',fontSize:64,color:p.c,fontWeight:400,lineHeight:1}}>{p.k}</span>
          </div>
        );
      })}
      {/* creator small, in foreground crushed */}
      {progress > .3 && (
        <div style={{position:'absolute',left:'50%',bottom:'12%',transform:'translateX(-50%)',zIndex:20}}>
          <div style={{fontFamily:'Instrument Serif,serif',fontSize:72,color:INK,textAlign:'center',letterSpacing:'-.02em',lineHeight:1}}>
            Same video.<br/><i style={{color:ACC}}>Eight edits.</i>
          </div>
        </div>
      )}
      <Caption text={`"—and eight platforms that all want it different."`} top={1740}/>
    </div>
  );
}

// ───────── Shot 3 — Real product flow montage (5–8s) ─────────
// ───────── Shot 3 — Real dashboard flow, full-view (4.5–9s) ─────────
function Shot3(){
  const { localTime, duration } = useSprite();
  // Dashboard screenshots are ~1917×873 (landscape); our frame is 1080×1920 portrait.
  // Show each full-width, pinned to a "device" area mid-frame with a subtle ken-burns pan
  // so the ENTIRE screenshot is visible — nothing gets cut off.
  const screens = [
    { src:'assets/dashboard-upload.png',    label:'01 · UPLOAD',        caption:'Drop your video',               headline:'Drop raw_cut.mp4' },
    { src:'assets/dashboard-processing.png',label:'02 · AI PROCESSING',  caption:'Captions · hashtags · hooks',    headline:'AI reads the footage' },
    { src:'assets/dashboard-review.png',    label:'03 · REVIEW',         caption:'Auto-scored · 72 viral',        headline:'Review · every platform' },
    { src:'assets/dashboard-calendar.png',  label:'04 · SCHEDULED',      caption:'Live across 8 networks',        headline:'Queued. Scheduled. Live.' },
  ];
  const step = duration / screens.length;

  return (
    <div style={{position:'absolute',inset:0,background:'linear-gradient(180deg,#0a0e1a 0%, #03050a 100%)',overflow:'hidden'}}>
      {/* screen stack */}
      {screens.map((s,i)=>{
        const sStart = i*step;
        const sEnd   = (i+1)*step;
        const fadeIn = clamp((localTime - sStart)/0.3, 0, 1);
        const fadeOut= clamp((sEnd - localTime)/0.3, 0, 1);
        const op = Math.min(fadeIn, fadeOut);
        if (op <= 0) return null;
        const local = localTime - sStart;
        const progress = local / step; // 0→1 within this screen
        // Ken burns: start slightly zoomed + panned, end slightly zoomed + panned opposite
        const scale = 1.05 + progress * 0.08;
        const panX = (progress - 0.5) * 40; // px
        const panY = (progress - 0.5) * 20;
        return (
          <div key={i} style={{
            position:'absolute',
            left: 40, right: 40,
            top: 380, bottom: 520,
            opacity: op,
            display:'flex', alignItems:'center', justifyContent:'center'
          }}>
            {/* device frame around the screenshot */}
            <div style={{
              width:'100%', aspectRatio:'1917 / 873',
              borderRadius:18, overflow:'hidden',
              border:'1px solid rgba(255,255,255,.12)',
              boxShadow:'0 50px 120px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.04), inset 0 0 0 1px rgba(255,255,255,.05)',
              background:'#0b0f1c',
              position:'relative'
            }}>
              <img src={s.src} alt="" style={{
                width:'100%', height:'100%',
                objectFit:'cover', objectPosition:'center',
                display:'block',
                transform:`scale(${scale}) translate(${panX}px, ${panY}px)`,
                transformOrigin:'center center'
              }}/>
            </div>
          </div>
        );
      })}

      {/* progress pips */}
      <div style={{position:'absolute',top:50,left:0,right:0,display:'flex',justifyContent:'center',gap:12,zIndex:30}}>
        {screens.map((_,i)=>{
          const active = localTime >= i*step && localTime < (i+1)*step;
          const done   = localTime >= (i+1)*step;
          return (
            <div key={i} style={{
              width: active ? 56 : 16, height:6, borderRadius:3,
              background: active ? ACC : (done ? '#4a5469' : '#1d2438'),
              transition:'all .3s'
            }}/>
          );
        })}
      </div>

      {/* Dynamic headline over current screen */}
      {screens.map((s,i)=>{
        const sStart = i*step;
        const sEnd   = (i+1)*step;
        if (localTime < sStart || localTime >= sEnd) return null;
        const fadeIn = clamp((localTime - sStart)/0.25, 0, 1);
        return (
          <React.Fragment key={i}>
            {/* top section: step chip + headline */}
            <div style={{position:'absolute',top:110,left:0,right:0,textAlign:'center',zIndex:30,opacity:fadeIn,transform:`translateY(${(1-fadeIn)*20}px)`}}>
              <div style={{display:'inline-block',background:'#07090d',border:`1px solid ${ACC}`,borderRadius:999,padding:'12px 24px',fontFamily:'JetBrains Mono,monospace',fontSize:22,color:ACC,letterSpacing:'.2em',marginBottom:22,boxShadow:`0 8px 24px rgba(0,0,0,.7)`}}>
                {s.label}
              </div>
              <div style={{fontFamily:'Instrument Serif,serif',fontSize:80,color:INK,letterSpacing:'-.025em',lineHeight:1,padding:'0 40px',textShadow:'0 4px 24px rgba(0,0,0,.9)'}}>
                {s.headline}
              </div>
            </div>
            {/* bottom caption */}
            <div style={{position:'absolute',bottom:320,left:40,right:40,textAlign:'center',zIndex:30,opacity:fadeIn}}>
              <div style={{display:'inline-block',background:'rgba(7,9,13,.8)',backdropFilter:'blur(10px)',border:'1px solid rgba(255,255,255,.08)',borderRadius:12,padding:'14px 24px',fontFamily:'Instrument Serif,serif',fontSize:40,color:COB,letterSpacing:'-.01em',fontStyle:'italic'}}>
                {s.caption}
              </div>
            </div>
          </React.Fragment>
        );
      })}

      <Caption text={`"I drop it once. The AI handles every platform."`} top={1780}/>
    </div>
  );
}

// ───────── Shot 4 — Orbit: one → eight (8–11.5s) ─────────
function Shot4(){
  const { localTime, progress } = useSprite();
  const platforms = [
    {k:'YT', l:'YouTube',   c:'#FF0000'},
    {k:'IG', l:'Instagram', c:'#dd2a7b'},
    {k:'FB', l:'Facebook',  c:'#1877F2'},
    {k:'LI', l:'LinkedIn',  c:'#0A66C2'},
    {k:'TT', l:'TikTok',    c:'#00F2EA'},
    {k:'X',  l:'X',         c:'#ffffff'},
    {k:'PT', l:'Pinterest', c:'#E60023'},
    {k:'TH', l:'Threads',   c:'#cfcfcf'},
  ];
  const cx = 540, cy = 960;
  const R = 380;
  const rot = localTime * 0.25;
  return (
    <div style={{position:'absolute',inset:0,background:'radial-gradient(circle at 50% 50%, #0d1220, #03050a 80%)'}}>
      <svg viewBox="0 0 1080 1920" style={{position:'absolute',inset:0,width:'100%',height:'100%'}}>
        {/* orbit rings */}
        <circle cx={cx} cy={cy} r={R} fill="none" stroke="#1d2438" strokeDasharray="6 10"/>
        <circle cx={cx} cy={cy} r={R-80} fill="none" stroke="#1d2438" strokeDasharray="2 8"/>

        {/* beams (staggered) */}
        {platforms.map((p,i)=>{
          const ang = (i/8)*Math.PI*2 - Math.PI/2 + rot;
          const start = i * 0.15;
          const t = clamp((localTime-start)/.4, 0, 1);
          if (t <= 0) return null;
          const ease = Easing.easeOutCubic(t);
          const x2 = cx + Math.cos(ang)*R*ease;
          const y2 = cy + Math.sin(ang)*R*ease;
          return (
            <line key={'b'+i} x1={cx} y1={cy} x2={x2} y2={y2}
              stroke={p.c} strokeWidth="3" opacity={0.5+0.5*(1-ease)}
              strokeLinecap="round"/>
          );
        })}

        {/* center source — real video frame (HTML img overlay for reliability) */}
        <g transform={`translate(${cx} ${cy})`}>
          <rect x={-120} y={-72} width={240} height={144} rx={16} fill="#0b0f1c" stroke={ACC} strokeWidth="3"/>
          <text x="0" y="108" textAnchor="middle" fontFamily="JetBrains Mono,monospace" fontSize="22" fill={INK}>raw_cut.mp4 · 01:42</text>
        </g>

        {/* platform node BACKGROUNDS (rings) */}
        {platforms.map((p,i)=>{
          const ang = (i/8)*Math.PI*2 - Math.PI/2 + rot;
          const start = i * 0.15 + 0.3;
          const t = clamp((localTime-start)/.5, 0, 1);
          if (t <= 0) return null;
          const ease = Easing.easeOutBack(t);
          const px = cx + Math.cos(ang)*R;
          const py = cy + Math.sin(ang)*R;
          return (
            <g key={'ring'+i} transform={`translate(${px} ${py}) scale(${ease})`}>
              <circle r="68" fill="#0b0f1c" stroke={p.c} strokeWidth="3"/>
              <text x="0" y="104" textAnchor="middle" fontFamily="JetBrains Mono,monospace" fontSize="18" fill="#8a93a8" letterSpacing="2">{p.l.toUpperCase()}</text>
            </g>
          );
        })}
      </svg>

      {/* platform LOGOS (HTML overlay for real brand marks) + checkmarks */}
      {platforms.map((p,i)=>{
        const ang = (i/8)*Math.PI*2 - Math.PI/2 + rot;
        const start = i * 0.15 + 0.3;
        const t = clamp((localTime-start)/.5, 0, 1);
        if (t <= 0) return null;
        const ease = Easing.easeOutBack(t);
        const px = cx + Math.cos(ang)*R;
        const py = cy + Math.sin(ang)*R;
        const chk = clamp((t-0.6)/0.4, 0, 1);
        return (
          <div key={'logo'+i} style={{
            position:'absolute',
            left: `calc(${px/1080*100}% - 40px)`,
            top:  `calc(${py/1920*100}% - 40px)`,
            width: 80, height: 80,
            display:'grid', placeItems:'center',
            transform:`scale(${ease})`,
            zIndex: 8,
            pointerEvents:'none'
          }}>
            <PlatformLogo kind={p.k} size={72}/>
            {chk > 0 && (
              <div style={{
                position:'absolute', right:-8, top:-8,
                width: 28*chk, height: 28*chk,
                borderRadius:'50%', background: ACC,
                display:'grid', placeItems:'center',
                boxShadow:`0 0 12px ${ACC}cc`
              }}>
                <svg width="16" height="16" viewBox="0 0 20 20"><path d="M 4 10 L 8 14 L 16 5" stroke="#07090d" strokeWidth="3" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
              </div>
            )}
          </div>
        );
      })}

      {/* center source video frame — HTML overlay positioned over the SVG center */}
      <div style={{
        position:'absolute',
        left: `calc(50% - 120px)`,
        top: `calc(${cy}px / 1920 * 100% - 72px)`,
        width: 240, height: 144,
        borderRadius: 16,
        overflow: 'hidden',
        border: `3px solid ${ACC}`,
        boxShadow: `0 0 40px ${ACC}66`,
        zIndex: 10,
        pointerEvents: 'none'
      }}>
        <img src={VIDEO_FRAME} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        {/* play glyph overlay */}
        <div style={{position:'absolute',inset:0,display:'grid',placeItems:'center',background:'rgba(0,0,0,.25)'}}>
          <div style={{width:42,height:42,borderRadius:'50%',background:'rgba(255,255,255,.9)',display:'grid',placeItems:'center'}}>
            <div style={{width:0,height:0,borderLeft:`14px solid ${BG}`,borderTop:'9px solid transparent',borderBottom:'9px solid transparent',marginLeft:4}}/>
          </div>
        </div>
      </div>

      {/* headline */}
      <div style={{position:'absolute',top:90,left:0,right:0,textAlign:'center',zIndex:30}}>
        <div style={{fontFamily:'Instrument Serif,serif',fontSize:72,color:INK,letterSpacing:'-.02em',lineHeight:1}}>
          Eight platforms.<br/><i style={{color:COB}}>Auto-formatted.</i>
        </div>
        {progress > .8 && (
          <div style={{marginTop:16,fontFamily:'JetBrains Mono,monospace',fontSize:26,color:ACC,letterSpacing:'.14em'}}>LIVE.</div>
        )}
      </div>
      <Caption text={`"—and publishes native cuts to all eight. Live."`} top={1760}/>
    </div>
  );
}

function Shot6(){
  const { localTime } = useSprite();

  return (
    <div style={{position:'absolute',inset:0,background:`radial-gradient(ellipse at 50% 40%, ${COB}, #03050a 70%)`}}>

          W<span style={{color:ACC}}>!</span>ntAi

          <div style={{fontFamily:'JetBrains Mono,monospace',fontSize:18,color:'#8a93a8',letterSpacing:'.14em'}}>14-DAY TRIAL · NO CARD</div>

// ───────── Caption component ─────────
function Caption({text, top=1700}){
  const { localTime, duration } = useSprite();
  const fadeIn = clamp(localTime/0.3, 0, 1);
  const fadeOut = clamp((duration - localTime)/0.3, 0, 1);
  const op = Math.min(fadeIn, fadeOut);
  return (
    <div style={{position:'absolute',left:40,right:40,top,zIndex:40,opacity:op,textAlign:'center'}}>
      <div style={{display:'inline-block',background:'rgba(0,0,0,.7)',padding:'12px 20px',borderRadius:10,fontFamily:'Inter',fontSize:26,color:INK,lineHeight:1.3,letterSpacing:'-.01em',fontWeight:500,maxWidth:'100%',backdropFilter:'blur(6px)'}}>
        {text}
      </div>
    </div>
  );
}

// ───────── Crossfade helper ─────────
function Scene({start, end, children}){
  return (
    <Sprite start={start} end={end}>
      {({ localTime, duration }) => {
        const fadeIn = clamp(localTime/0.25, 0, 1);
        const fadeOut = clamp((duration-localTime)/0.25, 0, 1);
        const op = Math.min(fadeIn, fadeOut);
        return <div style={{position:'absolute',inset:0,opacity:op}}>{children}</div>;
      }}
    </Sprite>
  );
}

// ───────── App ─────────
function App(){
  return (
    <Stage width={1080} height={1920} duration={15} background={BG} persistKey="wintai-ad">
      <Scene start={0}    end={2.0}><Shot1/></Scene>
      <Scene start={2.0}  end={4.5}><Shot2/></Scene>
      <Scene start={4.5}  end={9.0}><Shot3/></Scene>
      <Scene start={9.0}  end={12.0}><Shot4/></Scene>
      <Scene start={12.0} end={14.0}><Shot5/></Scene>
      <Scene start={14.0} end={15.0}><Shot6/></Scene>
      <Chrome/>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
