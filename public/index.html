<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#1e3a8a" />

<!-- Primary SEO -->
<title>Wintaibot – AI Assistant for PDF Analysis, Documents & Productivity</title>

<meta name="description" content="Wintaibot is an AI assistant that analyzes PDFs, extracts data from documents, transcribes audio, generates images, writes emails, and prepares you for interviews. Start free." />

<meta name="keywords" content="AI PDF analyzer, PDF data extraction, AI document assistant, voice transcription AI, AI image generator, email reply AI, interview prep AI, AI productivity tools, Wintaibot" />

<meta name="robots" content="index, follow" />

<meta name="author" content="Wint Kay Thwe Aung" />

<meta name="googlebot" content="index, follow" />

<link rel="canonical" href="https://wintaibot.com/" />

<!-- Open Graph (Facebook / LinkedIn) -->
<meta property="og:title" content="Wintaibot – AI Assistant for PDF Analysis & Documents" />
<meta property="og:description" content="Analyze PDFs, extract document data, transcribe audio, generate images, and automate email replies — all in one AI platform. Start free." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://wintaibot.com/" />
<meta property="og:site_name" content="Wintaibot" />
<meta property="og:image" content="https://wintaibot.com/android-chrome-512x512.png" />
<meta property="og:image:width" content="512" />
<meta property="og:image:height" content="512" />
<meta property="og:locale" content="en_US" />

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="Wintaibot – AI Assistant for PDFs & Documents" />
<meta name="twitter:description" content="Analyze PDFs, transcribe audio, generate images, prep for interviews, and automate email replies with Wintaibot AI. Free to start." />
<meta name="twitter:image" content="https://wintaibot.com/android-chrome-512x512.png" />

<!-- Favicons -->
<link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

<!-- Manifest -->
<link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

<!-- Preconnect for performance -->
<link rel="preconnect" href="https://api.wintaibot.com" crossorigin />

<!-- Structured Data - SoftwareApplication -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Wintaibot",
  "url": "https://wintaibot.com",
  "applicationCategory": "ProductivityApplication",
  "operatingSystem": "Web",
  "description": "Wintaibot is an AI assistant that analyzes PDFs, extracts document data, transcribes audio, generates images, writes email replies, and prepares users for job interviews.",
  "featureList": [
    "PDF data extraction and analysis",
    "AI document summarization",
    "Voice and audio transcription",
    "AI image generation from text",
    "AI email reply generator",
    "Resume-based interview preparation",
    "AI recipe generator"
  ],
  "offers": [
    {
      "@type": "Offer",
      "name": "Free",
      "price": "0",
      "priceCurrency": "USD",
      "description": "Includes AI chatbot and recipe generator"
    },
    {
      "@type": "Offer",
      "name": "Member",
      "price": "5.99",
      "priceCurrency": "USD",
      "billingIncrement": "P1M",
      "description": "Full access to all 7 AI tools including PDF analysis, transcription, image generation"
    }
  ],
  "creator": {
    "@type": "Person",
    "name": "Wint Kay Thwe Aung",
    "url": "https://github.com/wintkaythweaungRevature"
  }
}
</script>

<!-- Structured Data - WebSite -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Wintaibot",
  "url": "https://wintaibot.com",
  "description": "AI assistant for PDF analysis, document extraction, voice transcription, image generation, email writing, and interview preparation.",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://wintaibot.com/?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
}
</script>

<!-- Structured Data - Organization -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "name": "Wintaibot",
  "url": "https://wintaibot.com",
  "logo": "https://wintaibot.com/android-chrome-512x512.png",
  "contactPoint": {
    "@type": "ContactPoint",
    "email": "contact@wintaibot.com",
    "contactType": "customer support"
  },
  "sameAs": [
    "https://github.com/wintkaythweaungRevature"
  ]
}
</script>

<!-- Structured Data - FAQPage -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "What is Wintaibot?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Wintaibot is an AI assistant platform that helps you analyze PDFs, extract document data, transcribe audio, generate images, write email replies, prepare for job interviews, and plan meals — all in one web-based dashboard."
      }
    },
    {
      "@type": "Question",
      "name": "Is Wintaibot free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. The AI chatbot and recipe generator are completely free. Full access to all 7 tools including PDF analysis, transcription, image generation, email writer, and interview prep costs $5.99/month."
      }
    },
    {
      "@type": "Question",
      "name": "What file types does Wintaibot support for PDF analysis?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Wintaibot's DocuWizard supports PDF, Excel (.xlsx, .xls), and Word (.docx) files for data extraction and analysis."
      }
    },
    {
      "@type": "Question",
      "name": "Can I cancel my Wintaibot subscription?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, you can cancel your subscription at any time from Account Settings. You keep full access until the end of your current billing period."
      }
    }
  ]
}
</script>

</head>

<body>
<noscript>You need to enable JavaScript to run this app.</noscript>

<div id="root"></div>

</body>

</html>
